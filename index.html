<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Journal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #B6A5E5, #9774B5);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
    }

    /* Custom range slider styling */
    input[type=range] {
      -webkit-appearance: none; 
      width: 100%; 
      background: transparent; 
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 28px;
      width: 28px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      margin-top: -10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      transition: transform 0.1s ease;
    }
    input[type=range]::-webkit-slider-thumb:hover {
      transform: scale(1.1);
    }
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 8px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 4px;
    }
    input[type=range]:focus {
      outline: none;
    }
  </style>
</head>
<body class="text-white p-4">

  <div class="glass-card w-full max-w-lg rounded-[2rem] p-8 md:p-10 flex flex-col gap-8 relative">
    
    <button id="settings-btn" class="absolute top-6 right-6 text-white/60 hover:text-white transition-colors text-xl focus:outline-none" title="Configure Craft API">
      ⚙️
    </button>

    <div class="text-center">
      <h1 class="text-3xl font-bold tracking-wide mb-2 text-white">Daily Journal</h1>
      <p class="text-xs text-white/70 uppercase tracking-widest font-medium">Capture your day</p>
    </div>

    <div id="settings-panel" class="hidden flex flex-col gap-4 bg-black/10 border border-white/10 rounded-2xl p-5 transition-all">
      <h2 class="text-xs font-semibold tracking-widest text-white/80 uppercase">⚙️ Craft API Configuration</h2>
      <div class="flex flex-col gap-1.5">
        <label class="text-[11px] text-white/60 uppercase tracking-wider">Craft API Token</label>
        <input type="password" id="api-token-input" class="w-full bg-white/10 border border-white/20 rounded-xl p-3 text-sm text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-white/30" placeholder="paste your secret token here...">
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-[11px] text-white/60 uppercase tracking-wider">Target Page ID</label>
        <input type="text" id="page-id-input" class="w-full bg-white/10 border border-white/20 rounded-xl p-3 text-sm text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-white/30" placeholder="e.g., 2a6dbbc2-4e75-8188-ccea-28065ceef39f">
      </div>
      <button id="save-settings-btn" class="w-full py-2.5 bg-white/20 hover:bg-white/30 rounded-xl text-xs font-semibold tracking-wide transition-all active:scale-[0.98]">
        Save Credentials Locally
      </button>
    </div>

    <div class="flex flex-col gap-4 mt-2">
      <h2 class="text-xs font-semibold tracking-widest text-white/80 uppercase">WHAT'S YOUR VIBE TODAY?</h2>
      <div class="text-center h-24 flex items-center justify-center">
        <span id="emoji-display" class="text-7xl transition-transform duration-300 transform select-none">😐</span>
      </div>
      <div class="px-2">
        <input type="range" id="vibe-slider" min="1" max="5" value="3" class="w-full">
        <div class="flex justify-between text-xs text-white/70 font-medium mt-3 uppercase tracking-wider">
          <span>Terrible</span>
          <span>Amazing</span>
        </div>
      </div>
    </div>

    <div class="flex flex-col gap-3 mt-2">
      <h2 class="text-xs font-semibold tracking-widest text-white/80 uppercase">TELL ME MORE ABOUT IT...</h2>
      <textarea id="journal-input" rows="5" class="w-full bg-white/10 border border-white/20 rounded-2xl p-5 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/40 focus:bg-white/15 transition-all resize-none shadow-inner" placeholder="Powered by iced coffee and absolute chaos..."></textarea>
    </div>

    <div class="mt-2">
      <button id="save-btn" class="w-full py-4 bg-white/20 hover:bg-white/30 text-white font-semibold tracking-wide rounded-2xl transition-all duration-300 border border-white/30 flex items-center justify-center gap-2 hover:shadow-[0_8px_16px_rgba(0,0,0,0.1)] hover:-translate-y-1 active:translate-y-0 disabled:opacity-50 disabled:cursor-not-allowed">
        <span id="btn-text">Save Entry &check;</span>
      </button>
      <div id="status-message" class="text-center text-sm font-medium mt-4 h-5 opacity-0 transition-opacity duration-300"></div>
    </div>
  </div>

  <script>
    const emojis = {
      1: '😭', // Terrible
      2: '😔', // Bad
      3: '😐', // Okay
      4: '🙂', // Good
      5: '🤩'  // Amazing
    };
    
    const vibeLabels = {
      1: 'Terrible',
      2: 'Bad',
      3: 'Okay',
      4: 'Good',
      5: 'Amazing'
    };

    const slider = document.getElementById('vibe-slider');
    const emojiDisplay = document.getElementById('emoji-display');
    const saveBtn = document.getElementById('save-btn');
    const btnText = document.getElementById('btn-text');
    const journalInput = document.getElementById('journal-input');
    const statusMsg = document.getElementById('status-message');

    // Settings Panel Selectors
    const settingsBtn = document.getElementById('settings-btn');
    const settingsPanel = document.getElementById('settings-panel');
    const apiTokenInput = document.getElementById('api-token-input');
    const pageIdInput = document.getElementById('page-id-input');
    const saveSettingsBtn = document.getElementById('save-settings-btn');

    // Load Credentials from localStorage on start
    apiTokenInput.value = localStorage.getItem('craft_api_token') || '';
    pageIdInput.value = localStorage.getItem('craft_page_id') || '2a6dbbc2-4e75-8188-ccea-28065ceef39f';

    // Toggle Settings Panel
    settingsBtn.addEventListener('click', () => {
      settingsPanel.classList.toggle('hidden');
    });

    // Save Settings Locally
    saveSettingsBtn.addEventListener('click', () => {
      localStorage.setItem('craft_api_token', apiTokenInput.value.trim());
      localStorage.setItem('craft_page_id', pageIdInput.value.trim());
      showStatus('Credentials saved to local browser storage!', 'text-[#c6f6d5]');
      settingsPanel.classList.add('hidden');
    });

    // Emoji updater
    slider.addEventListener('input', (e) => {
      const val = e.target.value;
      
      if (emojiDisplay.textContent !== emojis[val]) {
        emojiDisplay.style.transform = 'scale(0.5)';
        setTimeout(() => {
          emojiDisplay.textContent = emojis[val];
          emojiDisplay.style.transform = 'scale(1.1)';
          setTimeout(() => {
            emojiDisplay.style.transform = 'scale(1)';
          }, 150);
        }, 100);
      }
    });

    // Save Action to actual Craft API
    saveBtn.addEventListener('click', async () => {
      const vibeValue = slider.value;
      const vibeText = vibeLabels[vibeValue];
      const content = journalInput.value.trim();

      // Retrieve keys securely from user's browser storage
      const token = localStorage.getItem('craft_api_token');
      const targetPageId = localStorage.getItem('craft_page_id');

      if (!token) {
        showStatus('Please click the ⚙️ icon to configure your Craft Token first!', 'text-[#ffb3b3]');
        settingsPanel.classList.remove('hidden');
        return;
      }

      if (!content) {
        showStatus('Please tell me more about your day before saving!', 'text-[#ffb3b3]');
        journalInput.focus();
        return;
      }

      // Loading state
      saveBtn.disabled = true;
      btnText.innerHTML = '<span class="animate-pulse">Writing to Craft...</span>';

      const dateStr = new Date().toLocaleDateString('en-US', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });

      const payload = {
        blocks: [
          {
            type: "text",
            textStyle: "h3",
            markdown: `### ${dateStr}`
          },
          {
            type: "text",
            decorations: ["quote", "callout"],
            markdown: `<callout>> Vibe: ${vibeText} ${emojis[vibeValue]}</callout>`
          },
          {
            type: "text",
            markdown: content
          },
          {
            type: "line",
            lineStyle: "regular",
            markdown: "*****"
          }
        ],
        position: {
          position: "end",
          pageId: targetPageId
        }
      };

      try {
        const response = await fetch('https://api.craft.do/v1/blocks', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(payload)
        });
        
        if (!response.ok) {
  throw new Error(`Craft API 連線失敗！狀態碼: ${response.status}`);
}

const data = await response.json();
console.log('Craft 成功回應:', data);
showStatus('Saved successfully!', 'text-[#b3ffb3]');
        
        // Reset entry form
        journalInput.value = '';
        slider.value = 3;
        emojiDisplay.textContent = emojis[3];
      } catch (error) {
        console.error("Craft Error Details:", error);
        showStatus('Failed to send to Craft. Check console logs.', 'text-[#ffb3b3]');
      } finally {
        saveBtn.disabled = false;
        btnText.innerHTML = 'Save Entry &check;';
      }
    });

    let statusTimeout;
    function showStatus(text, colorClass) {
      clearTimeout(statusTimeout);
      
      statusMsg.className = `text-center text-sm font-medium mt-4 h-5 transition-opacity duration-300 ${colorClass}`;
      statusMsg.textContent = text;
      
      void statusMsg.offsetWidth;
      statusMsg.style.opacity = '1';

      statusTimeout = setTimeout(() => {
        statusMsg.style.opacity = '0';
      }, 4000);
    }
  </script>
</body>
</html>
